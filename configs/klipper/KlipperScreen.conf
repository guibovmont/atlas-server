#KilpperScreen.conf - 22 Fev 26 - Antes de Separar os Macros


[main]
show_heater_power: True


[graph Printer]
extruder: True
heater_bed: True


# --- TELA PRINCIPAL (ORDEM DAS POSIÇÕES) ---


# POSIÇÃO 1 (Superior Esquerda)
[menu __main homing_custom]
name: Home Total
icon: home
method: printer.gcode.script
params: {"script":"G28"}


# POSIÇÃO 2 (Superior Direita)
[menu __main print_manual]
name: Imprimir
icon: printer
panel: print


# POSIÇÃO 3 (Meio Esquerda) - ÍCONE CORRIGIDO PARA 'print' ou 'file-open'
[menu __main preheat_custom]
name: Pre-Aquecer
icon: heat-up
method: printer.gcode.script
params: {"script":"M140 S60 \n M104 S150"}


# POSIÇÃO 4 (Meio Direita)
[menu __main manutencao]
name: Manutenção
icon: settings
method: printer.gcode.script
params: {"script":"POSICAO_MANUTENCAO"}


# POSIÇÃO 5 (Inferior Esquerda)
[menu __main more]
name: Extras
icon: fine-tune


# POSIÇÃO 6 (Inferior Direita)
[menu __main emergency]
name: PARADA TOTAL
icon: stop
style: error
method: printer.emergency_stop




# --- REGRAS DE OCULTAÇÃO (Obrigatório para evitar duplicatas) ---
[menu __main print]
enable: False


[menu __main move]
enable: False


[menu __main temperature]
enable: False


[menu __main extrude]
enable: False


# --- SEÇÃO EXTRAS (INTERIOR DO MENU MORE) ---


[menu __main more move]
name: Mover Eixos
icon: move
panel: move


[menu __main more temperature]
name: Temperatura
icon: heat-up
panel: preheat


[menu __main more extrude]
name: Extrusão
icon: extrude
panel: extrude


[menu __main more calibrar_z]
name: Calibrar Z
icon: z-dist  # Ícone mais específico para altura
method: printer.gcode.script
params: {"script":"CALIBRAR_Z"}


[menu __main more trocar_filamento]
name: Trocar Filamento
icon: extrude
method: printer.gcode.script
params: {"script":"M600"}


[menu __main more purga]
name: Purgar Cor
icon: extrude
method: printer.gcode.script
params: {"script":"PURGA"}


[menu __main more limpar]
name: Limpar Bico
icon: nozzle-clean
method: printer.gcode.script
params: {"script":"PURGE_AND_WIPE_RIGHT"}


# Mantenha os seus outros botões (Mover, Temperatura, Calibrar Z 2.0) abaixo destes.


