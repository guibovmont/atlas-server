#Printer.cfg - 10 Abril 26 - Stealthburner
[include mainsail.cfg]
#[include acelerometros.cfg] 
[include timelapse.cfg]
[exclude_object]    # Permite cancelar objetos individuais durante impressão multi-peça
#####################################################################
# CONFIGURAÇÃO DE ATIVAÇÃO DO TIMELAPSE
#####################################################################

[gcode_macro TIMELAPSE_ENABLE]
description: Ativa o Timelapse com configuracoes seguras
gcode:
    _SET_TIMELAPSE_SETUP ENABLE=True PARK_ENABLE=True PARK_POS=custom CUSTOM_POS_X=230 CUSTOM_POS_Y=195 TRAVEL_SPEED=200
    {action_respond_info("Timelapse: ATIVADO (Park X230 Y195 | Speed 200)")}

[gcode_macro TIMELAPSE_DISABLE]
description: Desativa o Timelapse
gcode:
    _SET_TIMELAPSE_SETUP ENABLE=False
    {action_respond_info("Timelapse: DESATIVADO")}
    
[gcode_macro TIMELAPSE_ENABLE_NOPARK]
description: Ativa o Timelapse SEM mover a cabeca
gcode:
    _SET_TIMELAPSE_SETUP ENABLE=True PARK_ENABLE=False
    {action_respond_info("Timelapse: ATIVADO (Sem Park - Foto na posicao atual)")}
    
#####################################################################
# 1. HARDWARE E CONEXÕES (MCUs)
#####################################################################

[mcu]
serial: /dev/ttyUSB0
restart_method: command

#[mcu cb1] # cb1 = processador ARM interno do PAD7 (não existe no notebook)
#serial: /tmp/klipper_host_mcu # /tmp/klipper_host_mcu = arquivo criado pelo Klipper quando roda no PAD7

[mcu eddy]
serial: /dev/serial/by-id/usb-Klipper_rp2040_504450593048671C-if00

[filament_switch_sensor btt_sfs_switch]
pause_on_runout: True
switch_pin: ^PA4 
runout_gcode:
    M117 Filamento acabou! (Switch)
    PAUSE

[filament_motion_sensor btt_sfs_motion]
switch_pin: ^PB0  
extruder: extruder
detection_length: 2.88
pause_on_runout: True
runout_gcode:
    M117 Travamento detectado! (Motion)
    PAUSE
    
#####################################################################
# 2. CONFIGURAÇÃO DO BTT EDDY
#####################################################################

[probe_eddy_current btt_eddy]
descend_z: 3.0
sensor_type: ldc1612
#z_offset: 0.5  # descend_z substituiu o z_offset a partir do Klipper v0.13+
i2c_mcu: eddy
i2c_bus: i2c0f
x_offset: -25
y_offset: 10

[duplicate_pin_override]
pins: eddy:gpio26

[temperature_sensor Btt_Eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26

[temperature_probe btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26
horizontal_move_z: 2

#####################################################################
# 3. FUNCIONALIDADES CORE (COMUNICAÇÃO E COMPATIBILIDADE)
#####################################################################

[pause_resume]
[display_status]
[respond]
[gcode_arcs]
resolution: 1.0

#####################################################################
# 4. IMPRESSORA E LIMITES DE MOVIMENTAÇÃO
#####################################################################

[printer]
kinematics: cartesian
max_velocity: 400
max_accel: 4000
max_z_velocity: 10
max_z_accel: 300
square_corner_velocity: 5.0

[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 240
homing_speed: 50

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 203
homing_speed: 50

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
homing_retract_dist: 0
position_min: -5.0
position_max: 145 #Cable chain na toolhead reduziu altura útil

#####################################################################
# 5. EXTRUSORA E AQUECIMENTO
#####################################################################

[extruder]
max_extrude_cross_section: 5
max_extrude_only_distance: 100.0
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 7.50
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: ATC Semitec 104GT-2  # era EPCOS 100K B57560G104F
sensor_pin: PC5
min_temp: 0
max_temp: 300
pressure_advance: 0.074
pressure_advance_smooth_time: 0.02
#control: pid
#pid_kp: 21.434
#pid_ki: 1.043
#pid_kd: 110.119

[verify_heater extruder]
max_error: 120
check_gain_time: 40
hysteresis: 10
heating_gain: 2

[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
min_temp: 0
max_temp: 115
control: pid
pid_kp = 71.629
pid_ki = 1.224
pid_kd = 1047.567

[verify_heater heater_bed]
max_error: 120
check_gain_time: 60
hysteresis: 5
heating_gain: 2

[fan]
pin: PA0
cycle_time: 0.00004
kick_start_time: 0.5
off_below: 0.10
hardware_pwm: False

#####################################################################
# 6. NIVELAMENTO E SENSORES (BLTOUCH / ADXL)
#####################################################################

[safe_z_home]
# Centro da mesa: X=120, Y=101.5
# Bico deve ir para: X = 120 - (-25) = 145 | Y = 101.5 - 10 = 91.5
home_xy_position: 145, 91.5
speed: 80
z_hop: 10

[force_move]
enable_force_move: True

[bed_mesh]
speed: 200
horizontal_move_z: 1.5
mesh_min: 10, 25      # probe_x = nozzle_x + (-25) | probe_y = nozzle_y + 10
mesh_max: 190, 193   # bico em X=215, Y=183
probe_count: 25, 25
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0

[screws_tilt_adjust]
screw1: 57, 22          # probe sobre parafuso X=32, Y=32 ✅
screw1_name: frente esquerda
screw2: 215, 22         # probe em X=190, ~12mm do parafuso ⚠️
screw2_name: frente direita
screw3: 215, 192        # probe em X=190, ~12mm do parafuso ⚠️
screw3_name: tras direita
screw4: 57, 192         # probe sobre parafuso X=32, Y=202 ✅
screw4_name: tras esquerda
horizontal_move_z: 5
speed: 150
screw_thread: CW-M4

[bed_screws]
screw1: 32, 32
screw1_name: frente esquerda
screw2: 202, 32
screw2_name: frente direita
screw3: 202, 202
screw3_name: tras direita
screw4: 32, 202
screw4_name: tras esquerda

#####################################################################
# 7. MACROS DE OPERAÇÃO E MANUTENÇÃO
#####################################################################

[gcode_macro CALIBRAR_Z]
description: Aquece e inicia a calibração do Z-Offset
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    M117 Preparando para calibrar...
    M140 S{BED_TEMP}
    M104 S{EXTRUDER_TEMP}
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    M117 Aquecendo mesa...
    M190 S{BED_TEMP}
    M117 Aquecendo bico...
    M109 S{EXTRUDER_TEMP}
    M117 Estabilizando calor...
    G4 P120000 
    M117 Iniciando Probe Calibrate...
    PROBE_EDDY_CURRENT_CALIBRATE CHIP=btt_eddy

[gcode_macro POSICAO_MANUTENCAO]
description: Centraliza a cabeca, traz a mesa para frente e libera X/Y
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    G90
    G1 Z110 F3000
    G1 X117.5 Y150 F5000
    M84 X Y
    M117 Manutencao: X e Y Livres

[gcode_macro M600]
description: Troca de filamento (Pausa e Retrai)
gcode:
    SAVE_GCODE_STATE NAME=M600_stat
    PAUSE
    G91
    G1 E-5 F2700
    G1 Z10
    G90
    G1 X50 Y0 F3000
    G91
    G1 E-50 F1000
    RESTORE_GCODE_STATE NAME=M600_state

[gcode_macro PURGA]
description: Extrusao de limpeza para troca de cor
gcode:
    G91
    G1 E30 F300
    G90

[gcode_macro PURGE_AND_WIPE_RIGHT]
gcode:
    SAVE_GCODE_STATE NAME=clean_state
    G90

    # 1. POSICIONAMENTO PARA PURGA
    G1 Z10 F3000
    G1 X215 Y15 F6000      ; limite máximo do bico em X
    G1 Z0.28 F300

    # 2. PURGA
    M117 Purgando...
    G92 E0
    G1 Y30 E30 F800
    G92 E0
    G1 E-1.0 F3000

    # 3. MOVE PARA ESCOVA
    M117 Indo para Escova...
    G1 X240 F6000           ; entra na zona da escova
    G1 Z-2 F600             ; desce SOMENTE quando sobre a escova

    # 4. LIMPEZA
    M117 Escovando...
    {% for i in range(6) %}
        G1 Y15 F5000
        G1 Y50 F5000
    {% endfor %}

    # 5. SAÍDA SEGURA
    G1 Z10 F3000
    M117 Bico Limpo!

    RESTORE_GCODE_STATE NAME=clean_state

[gcode_macro TEST_SPEED_3000]
description: Teste de velocidade e aceleracao para o canal Hiperfoco Masculino
gcode:
    # Parâmetros de Velocidade e Aceleração
    {% set speed  = params.SPEED|default(200)|float %}
    {% set accel  = params.ACCEL|default(3000)|float %}
    {% set cycles = params.CYCLES|default(5)|int %}
    
    # Definição de Limites de Movimento (Centralizado na mesa 235x235)
    {% set x_min = 50 %}
    {% set x_max = 185 %}
    {% set y_min = 50 %}
    {% set y_max = 185 %}
    {% set z_height = 20 %}

    G28 ; Home
    G1 Z{z_height} F1500 ; Sobe o Z para segurança
    
    # Aplica os limites de performance temporários
    SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} ACCEL_TO_DECEL={accel / 2}
    
    M117 Iniciando Stress Test @ {accel} mm/s2
    
    {% for i in range(cycles) %}
        # Desenha um Quadrado
        G1 X{x_min} Y{y_min} F{speed * 60}
        G1 X{x_max} Y{y_min} F{speed * 60}
        G1 X{x_max} Y{y_max} F{speed * 60}
        G1 X{x_min} Y{y_max} F{speed * 60}
        G1 X{x_min} Y{y_min} F{speed * 60}
        
        # Desenha um X (Diagonal)
        G1 X{x_max} Y{y_max} F{speed * 60}
        G1 X{x_min} Y{y_max} F{speed * 60}
        G1 X{x_max} Y{y_min} F{speed * 60}
    {% endfor %}

    G28 X Y ; Volta para o Home para conferir se perdeu passos
    M117 Teste Concluido!
    SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel}

[gcode_macro Z_ALINHAR_PARQUIMETRO]
description: Centraliza o bico a 100mm e libera o motor Z para ajuste manual com timeout de 1h
gcode:
    M117 Fazendo Home...
    G28                               # Home completo para referenciar eixos
    M117 Posicionando no centro...
    G1 Z10 F600                      # Sobe para 100mm (altura segura para parquímetro)
    G1 X120 Y101.5 F3000    # Centraliza o bico (Baseado em X240 e Y203)
    
    M117 Configurando Timeout...
    SET_IDLE_TIMEOUT TIMEOUT=3600     # Mantém a impressora ativa por 1 hora
    
    M117 Motores Z Liberados...
    SET_STEPPER_ENABLE STEPPER=stepper_z ENABLE=0 # Desliga o motor Z para girar o fuso manualmente
    
    # Se você tiver drivers independentes para Dual Z, remova o '#' da linha abaixo:
    # SET_STEPPER_ENABLE STEPPER=stepper_z1 ENABLE=0 
    
    RESPOND MSG="Eixo Z liberado por 60 min. Use o parquímetro e execute Z_FINALIZAR após o ajuste."

[gcode_macro Z_FINALIZAR]
description: Reativa motores, faz home e gera nova malha via Rapid Scan
gcode:
    M117 Reativando motores e sincronizando...
    SET_KINEMATIC_POSITION Z=0 # Define uma posição falsa para permitir movimento se necessário
    G28 Z                        # Reestabelece o zero após o ajuste manual e reativa os motores
    M117 Iniciando Rapid Scan...
    BED_MESH_CALIBRATE METHOD=rapid_scan # Gera a malha de alta velocidade com o Eddy
    G1 Z10 F600                  # Sobe para uma altura de segurança
    M117 Tudo Pronto!

#####################################################################
# 8. MACROS DE INÍCIO E FIM (PRINT HANDLING)
#####################################################################

[gcode_macro START_PRINT]
description: Inicia a impressao com Pre-aquecimento e Limpeza
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}  
    
    # --- Início do Aquecimento Síncrono ---
    M117 Preparando impressora...
    #TIMELAPSE_TAKE_FRAME ; Garante que o sistema está pronto
    M140 S{BED_TEMP}             ; Inicia aquecimento da mesa
    G90                          ; Coordenadas absolutas
    M117 Fazendo Home (G28)...
    G28                          ; Home de todos os eixos
    TIMELAPSE_ENABLE_NOPARK      ; Habilitando Timelapse
    # Aguarda o sensor Eddy atingir pelo menos 40°C (seu drift_min)
    M117 Aguardando Sensor Eddy (40C)...
    TEMPERATURE_WAIT SENSOR="temperature_sensor Btt_Eddy" MINIMUM=40
    M117 Aquecendo mesa: {BED_TEMP}C
    M190 S{BED_TEMP}             ; Aguarda mesa chegar na temperatura final
    M117 Mapeando mesa (Eddy)...
    BED_MESH_CALIBRATE METHOD=rapid_scan ; Gera malha nova com Eddy
    M117 Aquecendo bico para espera...
    G1 Z5 F3000                  ; Sobe o bico
    M109 S{EXTRUDER_TEMP}        ; Aguarda bico aquecer
    
    # --- Posicionamento Pré-Purga ---
    M117 Posicionando para purga...
    G1 Z10 F3000             ; Sobe por segurança
    G1 X215 Y15 F5000        ; JA POSICIONA NO LOCAL DO PURGE
    
    # --- Aquecimento Final ---
    M117 Aquecendo Bico...
    M109 S{EXTRUDER_TEMP}    ; Espera bico atingir temp final ja na posição
    G4 P2000                 ; Aguarda 2 segundos extras para estabilizar
    
    # --- Limpeza e Expurgo ---
    M117 Iniciando limpeza...
    PURGE_AND_WIPE_RIGHT     ; Chama sua macro de limpeza
    
    M117 Imprimindo...
    G92 E0                   ; Reseta extrusora

[gcode_macro END_PRINT]
description: Finaliza, entrega a mesa e posiciona para manutenção
gcode:
    M140 S0
    M104 S0
    M106 S0
    G91
    G1 E-3 F3600                          ; retrai sem mover XY
    G1 Z10 F3000                          ; sobe 10mm relativo (seguro sobre a peça)
    G90
    G1 X150 Y150 F5000                    ; move XY com bico já elevado
    {% set safe_z = [printer.toolhead.position.z + 40, printer.toolhead.position.z + 40] | max %}
    {% set safe_z = [safe_z, printer.toolhead.axis_maximum.z] | min %}
    G1 Z{safe_z} F3000                    ; sobe mais 40mm ou até o limite físico
    M84 X Y E
    TIMELAPSE_RENDER
    M117 Impressao Concluida!

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    TIMELAPSE_RENDER    ; Salva o que gravou até o momento do erro/cancelamento
    BASE_CANCEL_PRINT

